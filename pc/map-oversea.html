<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>CUCKOO Global Network Test</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap/dist/jsvectormap.min.css" />

    <!-- Core library -->
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>
    <!-- World map -->
    <script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>

    <style>
        body {
            background:#fff;
            margin: 0;
            padding: 0;
        }
        .wrapper {
            background:#f0f0f0;
            width: 100%;
            margin: 100px auto;
        }
        
        /* 중요: 지도가 그려질 영역은 반드시 높이값이 있어야 합니다 */
        #map {
            width: 100%;
            height: 600px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div id="map"></div>
    </div>

    <script>
        // CDN 사용 시 import 문은 삭제해야 합니다. jsVectorMap은 전역 변수로 자동 로드됩니다.
        const map = new jsVectorMap({
            selector: '#map',
            map: 'world',
            zoomOnScroll: false, // 휠로 지도 확대되는 것 방지 (선택)
            
            // 지도 기본 스타일
            regionStyle: {
                initial: { fill: '#d1d5db' }, // 국가 기본색
                hover: { fill: '#9ca3af' }    // 마우스 호버 시
            },

            // 마커 스타일 (이미지 속 빨간 깃발 대신 세련된 포인트 마커)
            markerStyle: {
                initial: { fill: '#E30613', stroke: '#fff', strokeWidth: 3, r: 7 },
                hover: { fill: '#000' }
            },

            // 이미지 자료 기반 마커 위치 설정
            markers: [
                // 중국 (지역별 분리)
                { name: 'CHINA: 청도복구전자 (Qingdao)', coords: [36.0671, 120.3826] },
                { name: 'CHINA: 심양복구전자 (Shenyang)', coords: [41.8057, 123.4315] },
                { name: 'CHINA: 복구/중산 법인 (Guangzhou)', coords: [23.1291, 113.2644] },

                // 미주/아시아/오세아니아 (이미지 주소 기반)
                { name: 'USA: CKA / CKRA (La Mirada)', coords: [33.9056, -118.0162] },
                { name: 'MALAYSIA: CKI / COT / CKM (Selangor)', coords: [3.1073, 101.5950] },
                { name: 'VIETNAM: CKV (Ho Chi Minh)', coords: [10.8231, 106.6297] },
                { name: 'INDONESIA: CKID (Jakarta)', coords: [-6.2088, 106.8456] },
                { name: 'INDIA: CKIN (Gurgaon)', coords: [28.4595, 77.0266] },
                { name: 'SINGAPORE: CKS (Singapore)', coords: [1.2903, 103.8520] },
                { name: 'AUSTRALIA: CKO (Sydney)', coords: [-33.8688, 151.2093] }
            ],

            // 마커에 마우스 올렸을 때 이름 표시
            onMarkerTooltipShow(event, tooltip, index) {
                tooltip.text(map.params.markers[index].name)
            }
        });
    </script>

</body>
</html>
